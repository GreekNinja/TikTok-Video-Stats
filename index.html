<!DOCTYPE html>
<html lang="el">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Video Stats</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
<style>
    body {
        background-color: #1a1a2e;
        color: #e0e0e0;
        font-family: Arial, sans-serif;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        margin: 0;
    }
    .video-container {
        background-color: #2c3e50;
        border-radius: 15px;
        padding: 40px;
        width: 800px;
        max-width: 90%;
        box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
        text-align: center;
    }
    .video-header {
        position: relative;
    }
    .profile-pic {
        width: 60px;
        height: 60px;
        border-radius: 50%;
        border: 2px solid #e74c3c;
        position: absolute;
        top: -70px; /* Ajusta para que quede por encima del título */
        left: 50%;
        transform: translateX(-50%);
        overflow: hidden;
    }
    .profile-pic img {
        width: 100%;
        height: 100%;
        object-fit: cover;
    }
    .video-title {
        font-size: 2em;
        font-weight: bold;
        color: #ffffff;
        margin-top: 30px; /* Espacio para la foto de perfil */
        margin-bottom: 5px;
    }
    .video-creator {
        color: #bdc3c7;
        font-size: 0.9em;
        margin-bottom: 25px;
    }
    .views-count {
        font-size: 6em;
        font-weight: bold;
        color: #ffffff;
        margin: 10px 0;
    }
    .views-label {
        color: #bdc3c7;
        font-size: 0.9em;
        margin-bottom: 40px;
    }
    .stats-container {
        display: flex;
        justify-content: space-around;
        align-items: center;
        margin-bottom: 40px;
    }
    .stat-item {
        text-align: center;
    }
    .stat-value {
        font-size: 2.5em;
        font-weight: bold;
        color: #ffffff;
    }
    .stat-label {
        color: #bdc3c7;
        font-size: 1em;
    }
    .stat-label i {
        margin-right: 8px;
    }
    .change-video-btn {
        background-color: transparent;
        border: 2px solid #2ecc71;
        color: #2ecc71;
        padding: 12px 30px;
        font-size: 1.1em;
        font-weight: bold;
        border-radius: 50px;
        cursor: pointer;
        transition: background-color 0.3s, color 0.3s;
    }
    .change-video-btn:hover {
        background-color: #2ecc71;
        color: #2c3e50;
    }
    .change-video-btn i {
        margin-left: 8px;
    }
</style>
</head>
<body>

<div class="video-container">
    <div class="video-header">
        <div class="profile-pic">
            <img src="https://p16-amd-va.tiktokcdn.com/tos-maliva-avt-0068/2850cb908e92d623c3e40257b277ae09~tplv-tiktokx-cropcenter-q:720:720:q75.webp?dr=10795&idc=maliva&ps=87d6e48a&s=AWEME_DETAIL&sc=avatar&shcp=1d1a97fc&shp=d05b14bd&t=223449c4" alt="Profile Picture">
        </div>
        <h1 class="video-title">Η Απίθανη Γιαγιά που Πηδάει μέσα στη Λάβα!#Greek...</h1>
        <p class="video-creator">@7515124543250304278</p>
    </div>

    <div class="views-count">204</div>
    <p class="views-label">Views <i class="far fa-eye"></i></p>

    <div class="stats-container">
        <div class="stat-item">
            <div class="stat-value">9</div>
            <div class="stat-label">
                <i class="fas fa-heart" style="color: #e74c3c;"></i> Likes
            </div>
        </div>
        <div class="stat-item">
             <div class="stat-value">3</div>
            <div class="stat-label">
                 <i class="fas fa-comment-dots"></i> Comments
            </div>
        </div>
        <div class="stat-item">
            <div class="stat-value">0</div>
            <div class="stat-label">
                 <i class="fas fa-share-square"></i> Shares
            </div>
        </div>
    </div>

    <button class="change-video-btn">
        Change Video <i class="fas fa-search"></i>
    </button>
</div>

</body>
</html>
