<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live TikTok Stats Dashboard</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        :root {
            --color-bg: #1a1a2e;
            --color-container-bg: #2c3e50;
            --color-text-primary: #ffffff;
            --color-text-secondary: #bdc3c7;
            --color-accent-green: #2ecc71;
            --color-accent-green-dark: #27ae60;
            --color-accent-red: #e74c3c;
            --color-update-increase: rgba(46, 204, 113, 0.3); /* Verde para aumento */
        }

        body {
            background-color: var(--color-bg);
            color: var(--color-text-primary);
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: flex-start; /* Alineado arriba para ver el historial */
            min-height: 100vh;
            margin: 0;
            padding: 40px 20px;
            box-sizing: border-box;
        }

        .main-container {
            width: 800px;
            max-width: 100%;
            background-color: var(--color-container-bg);
            border-radius: 15px;
            padding: 40px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
            text-align: center;
        }

        /* --- Sección de Búsqueda --- */
        .search-box h2 {
            margin-top: 0;
        }
        #videoUrlInput {
            width: calc(100% - 24px);
            padding: 12px;
            border-radius: 5px;
            border: 2px solid #34495e;
            background-color: var(--color-bg);
            color: var(--color-text-primary);
            font-size: 1em;
            margin-bottom: 15px;
        }
        #searchButton {
            background-color: var(--color-accent-green);
            color: var(--color-text-primary);
            border: none;
            padding: 12px 25px;
            font-size: 1.1em;
            font-weight: bold;
            border-radius: 5px;
            cursor: pointer;
            transition: background-color 0.3s, transform 0.1s;
            width: 100%;
        }
        #searchButton:hover {
            background-color: var(--color-accent-green-dark);
        }
        #searchButton:disabled {
            background-color: #555;
            cursor: not-allowed;
        }

        /* --- Contenedor de Estadísticas --- */
        #statsWrapper.hidden {
            display: none;
        }
        .video-header {
            position: relative;
            margin-bottom: 20px;
        }
        .profile-pic {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            border: 3px solid var(--color-accent-red);
            margin: 0 auto 15px auto;
            overflow: hidden;
            background-color: var(--color-bg);
        }
        .profile-pic img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        #creator {
            font-size: 1.5em;
            font-weight: bold;
        }
        #desc {
            font-size: 1em;
            color: var(--color-text-secondary);
            margin-top: 5px;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 20px;
            margin: 30px 0;
        }
        .stat-item {
            background-color: rgba(0,0,0,0.2);
            padding: 20px;
            border-radius: 10px;
        }
        .stat-label {
            font-size: 1.1em;
            color: var(--color-text-secondary);
            margin-bottom: 10px;
        }
        .stat-value {
            font-size: 2.5em;
            font-weight: bold;
            transition: background-color 0.2s;
        }
        .stat-value-changing {
            background-color: var(--dynamic-update-color);
            border-radius: 5px;
        }

        /* --- Barra de Progreso --- */
        .progress-bar-wrapper {
            margin: 30px 0;
        }
        .progress-bar-label {
            font-size: 0.9em;
            color: var(--color-text-secondary);
            margin-bottom: 8px;
        }
        .progress-bar-container {
            width: 100%;
            background-color: #1a1a2e;
            border-radius: 5px;
            overflow: hidden;
        }
        .progress-bar-fill {
            height: 10px;
            width: 0%;
            background-color: var(--color-accent-green);
            border-radius: 5px;
        }

        /* --- Botones de Medios y Descarga --- */
        .media-buttons {
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 15px;
            margin-top: 20px;
        }
        .media-buttons button, .media-buttons a {
            background-color: #34495e;
            color: var(--color-text-primary);
            border: none;
            padding: 10px 20px;
            font-size: 1em;
            border-radius: 5px;
            cursor: pointer;
            text-decoration: none;
            transition: background-color 0.3s;
        }
        .media-buttons button:hover, .media-buttons a:hover {
            background-color: #4a627a;
        }

        /* --- Historial --- */
        #historyContainer {
            margin-top: 30px;
            text-align: left;
        }
        #historyContainer h3 {
            text-align: center;
            border-bottom: 1px solid #4a627a;
            padding-bottom: 10px;
            margin-bottom: 15px;
        }
        #historyList {
            list-style: none;
            padding: 0;
            max-height: 300px;
            overflow-y: auto;
        }
        #historyList li {
            background-color: rgba(0,0,0,0.15);
            padding: 15px;
            border-radius: 5px;
            margin-bottom: 10px;
            font-size: 0.9em;
            border-left: 3px solid var(--color-accent-green);
        }
        #historyList li strong {
            color: var(--color-text-secondary);
        }
    </style>
</head>
<body>

<div class="main-container">
    <div class="search-box">
        <h2>📊 Live TikTok Stats Dashboard</h2>
        <input type="text" id="videoUrlInput" placeholder="Pega la URL del vídeo de TikTok aquí">
        <button id="searchButton" onclick="startFetchingData()">🚀 Obtener Estadísticas</button>
    </div>

    <div id="statsWrapper" class="hidden">
        <div class="video-header">
            <div class="profile-pic">
                <img id="profilePic" src="data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7" alt="Profile Picture">
            </div>
            <h3 id="creator">-</h3>
            <p id="desc">-</p>
        </div>

        <div class="stats-grid">
            <div class="stat-item"><div class="stat-label">👁️ Vistas</div><div id="views" class="stat-value">0</div></div>
            <div class="stat-item"><div class="stat-label">❤️ Me gusta</div><div id="likes" class="stat-value">0</div></div>
            <div class="stat-item"><div class="stat-label">💬 Comentarios</div><div id="comments" class="stat-value">0</div></div>
            <div class="stat-item"><div class="stat-label">🔄 Compartidos</div><div id="shares" class="stat-value">0</div></div>
        </div>
        
        <div class="progress-bar-wrapper">
            <p class="progress-bar-label">Próxima actualización en:</p>
            <div class="progress-bar-container">
                <div id="refreshProgressBar" class="progress-bar-fill"></div>
            </div>
        </div>

        <div class="media-buttons">
            <button id="playButton" style="display: none;" onclick="playMusic()">▶️ Reproducir Sonido</button>
            <a id="downloadMP3" href="#" target="_blank" style="display: none;">🎶 Descargar MP3</a>
            <a id="downloadVideo" href="#" target="_blank"style="display: none;">⬇️ Descargar Vídeo</a>
        </div>
        
        <div id="historyContainer">
            <h3>Historial de Actualizaciones</h3>
            <ul id="historyList"></ul>
        </div>
    </div>
</div>

<script>
    let lastStats = { plays: 0, likes: 0, shares: 0, comments: 0 };
    let fetchIntervalId;
    let musicAudio = null;
    let isTabActive = true;
    const REFRESH_INTERVAL_MS = 20000; // 20 segundos
    const ANIMATION_DURATION_MS = 1000; // 1 segundo

    // --- LÓGICA PRINCIPAL ---
    
    function startFetchingData() {
        if (fetchIntervalId) clearInterval(fetchIntervalId);

        fetchVideoData().then(success => {
            if (success) {
                updateProgressBar();
                fetchIntervalId = setInterval(() => {
                    if (isTabActive) {
                        fetchVideoData().then(fetchSuccess => {
                            if (fetchSuccess) updateProgressBar();
                        });
                    }
                }, REFRESH_INTERVAL_MS);
            }
        });
    }

    async function fetchVideoData() {
        const urlInput = document.getElementById('videoUrlInput').value;
        const match = urlInput.match(/video\/(\d+)/);
        if (!match) {
            alert('URL de TikTok no válida. Por favor, pega un enlace de vídeo válido.');
            return false;
        }
        const videoId = match[1];
        
        const searchButton = document.getElementById('searchButton');
        searchButton.innerText = '⏳ Obteniendo...';
        searchButton.disabled = true;

        const apiUrl = `https://api.allorigins.win/get?url=${encodeURIComponent(`https://countik.com/api/videoinfo/${videoId}`)}`;

        try {
            const response = await fetch(apiUrl);
            if (!response.ok) throw new Error('Error de red.');
            
            const apiData = await response.json();
            const data = JSON.parse(apiData.contents);

            if (data && data.status === 'success') {
                displayData(data);
                saveHistory(data);
                return true;
            } else {
                throw new Error(data.message || 'Vídeo no encontrado.');
            }
        } catch (error) {
            alert(`No se pudieron obtener los datos: ${error.message}`);
            return false;
        } finally {
            searchButton.innerText = '🚀 Obtener Estadísticas';
            searchButton.disabled = false;
        }
    }

    // --- ACTUALIZACIÓN DE LA INTERFAZ ---

    function displayData(data) {
        document.getElementById('statsWrapper').classList.remove('hidden');

        // Pausar música anterior si se busca un nuevo vídeo
        if (musicAudio) musicAudio.pause();
        musicAudio = null;

        // Info básica
        document.getElementById('profilePic').src = data.cover; // Usando el cover como foto de perfil para un mejor visual
        document.getElementById('creator').innerText = `@${data.creator}`;
        document.getElementById('desc').innerText = data.desc || 'Sin descripción.';

        // Botones de Medios
        const playButton = document.getElementById('playButton');
        const downloadMP3 = document.getElementById('downloadMP3');
        const downloadVideo = document.getElementById('downloadVideo');

        if (data.music_play_url) {
            playButton.style.display = 'inline-block';
            downloadMP3.style.display = 'inline-block';
            downloadMP3.href = data.music_play_url;
            playButton.innerText = '▶️ Reproducir Sonido';
        } else {
            playButton.style.display = 'none';
            downloadMP3.style.display = 'none';
        }

        if (data.download_link) {
            downloadVideo.style.display = 'inline-block';
            downloadVideo.href = data.download_link;
        } else {
            downloadVideo.style.display = 'none';
        }

        // Animación de contadores
        animateCounter(document.getElementById('views'), data.plays, lastStats.plays);
        animateCounter(document.getElementById('likes'), data.likes, lastStats.likes);
        animateCounter(document.getElementById('shares'), data.shares, lastStats.shares);
        animateCounter(document.getElementById('comments'), data.comments, lastStats.comments);

        // Actualizar últimas estadísticas
        lastStats = {
            plays: Number(data.plays) || 0,
            likes: Number(data.likes) || 0,
            shares: Number(data.shares) || 0,
            comments: Number(data.comments) || 0,
        };
    }

    function animateCounter(element, target, previous) {
        target = Number(target) || 0;
        previous = Number(previous) || 0;

        if (target !== previous) {
            element.classList.add('stat-value-changing');
            // Solo aplicamos color si aumenta
            if (target > previous) {
                element.style.setProperty('--dynamic-update-color', 'var(--color-update-increase)');
            } else {
                 element.style.setProperty('--dynamic-update-color', 'transparent');
            }

            setTimeout(() => {
                element.classList.remove('stat-value-changing');
            }, ANIMATION_DURATION_MS);
        }
        element.innerText = target.toLocaleString('es-ES');
    }
    
    function updateProgressBar() {
        const progressBarFill = document.getElementById('refreshProgressBar');
        if (progressBarFill) {
            progressBarFill.style.transition = 'none';
            progressBarFill.style.width = '0%';
            void progressBarFill.offsetWidth; // Forzar reflow
            progressBarFill.style.transition = `width ${REFRESH_INTERVAL_MS / 1000}s linear`;
            progressBarFill.style.width = '100%';
        }
    }

    // --- MÚSICA ---

    function playMusic() {
        const musicUrl = document.getElementById('downloadMP3').href;
        const playButton = document.getElementById('playButton');

        if (musicAudio && !musicAudio.paused) {
            musicAudio.pause();
            playButton.innerText = "▶️ Reproducir Sonido";
        } else {
            if (!musicAudio || musicAudio.src !== musicUrl) {
                musicAudio = new Audio(musicUrl);
                musicAudio.onended = () => {
                    playButton.innerText = "▶️ Reproducir Sonido";
                };
            }
            musicAudio.play().then(() => {
                playButton.innerText = "⏹️ Detener Sonido";
            }).catch(err => console.error("Error al reproducir:", err));
        }
    }

    // --- HISTORIAL ---
    
    function saveHistory(newData) {
        const currentUrl = document.getElementById('videoUrlInput').value;
        const historyKey = `stats_history_${currentUrl}`;
        let history = JSON.parse(localStorage.getItem(historyKey)) || [];

        const lastEntry = history.length > 0 ? history[history.length - 1].data : {};
        const changes = [];

        // Comparar con el último registro en el historial para este vídeo específico
        if (newData.plays !== lastEntry.plays) changes.push(`Vistas: ${Number(lastEntry.plays || 0).toLocaleString('es-ES')} → ${Number(newData.plays).toLocaleString('es-ES')}`);
        if (newData.likes !== lastEntry.likes) changes.push(`Me gusta: ${Number(lastEntry.likes || 0).toLocaleString('es-ES')} → ${Number(newData.likes).toLocaleString('es-ES')}`);
        if (newData.shares !== lastEntry.shares) changes.push(`Compartidos: ${Number(lastEntry.shares || 0).toLocaleString('es-ES')} → ${Number(newData.shares).toLocaleString('es-ES')}`);
        if (newData.comments !== lastEntry.comments) changes.push(`Comentarios: ${Number(lastEntry.comments || 0).toLocaleString('es-ES')} → ${Number(newData.comments).toLocaleString('es-ES')}`);

        if (changes.length > 0 || history.length === 0) {
            const historyEntry = {
                timestamp: new Date().toISOString(),
                data: {
                    plays: newData.plays,
                    likes: newData.likes,
                    shares: newData.shares,
                    comments: newData.comments
                },
                changes: (history.length === 0) ? ['Datos iniciales cargados.'] : changes
            };
            history.push(historyEntry);
            localStorage.setItem(historyKey, JSON.stringify(history));
        }
        loadHistory();
    }

    function loadHistory() {
        const historyList = document.getElementById('historyList');
        const currentUrl = document.getElementById('videoUrlInput').value;
        const historyKey = `stats_history_${currentUrl}`;
        const history = JSON.parse(localStorage.getItem(historyKey)) || [];
        
        historyList.innerHTML = ''; // Limpiar la lista antes de volver a cargar
        history.slice().reverse().forEach(entry => displayHistoryEntry(entry));
    }

    function displayHistoryEntry(entry) {
        const historyList = document.getElementById('historyList');
        const listItem = document.createElement('li');
        const timeAgo = timeSince(new Date(entry.timestamp));
        listItem.innerHTML = `<strong>${timeAgo}:</strong> ${entry.changes.join(', ')}`;
        historyList.appendChild(listItem);
    }
    
    function timeSince(date) {
        const seconds = Math.floor((new Date() - date) / 1000);
        let interval = seconds / 31536000;
        if (interval > 1) return Math.floor(interval) + " años";
        interval = seconds / 2592000;
        if (interval > 1) return Math.floor(interval) + " meses";
        interval = seconds / 86400;
        if (interval > 1) return Math.floor(interval) + " días";
        interval = seconds / 3600;
        if (interval > 1) return Math.floor(interval) + " horas";
        interval = seconds / 60;
        if (interval > 1) return Math.floor(interval) + " minutos";
        return Math.floor(seconds) + " segundos";
    }

    // --- MANEJO DE VISIBILIDAD DE LA PESTAÑA ---
    
    document.addEventListener("visibilitychange", () => {
        isTabActive = !document.hidden;
        if (!isTabActive && musicAudio) {
            musicAudio.pause();
            document.getElementById('playButton').innerText = "▶️ Reproducir Sonido";
        }
    });

</script>
</body>
</html>
