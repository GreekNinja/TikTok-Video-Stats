<!DOCTYPE html>
<html lang="el">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Live TikTok Video Stats</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
<style>
    /* Estilos Generales */
    body {
        background-color: #1a1a2e;
        color: #e0e0e0;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        margin: 0;
        padding: 20px;
        box-sizing: border-box;
    }

    /* Contenedor principal */
    .main-container {
        width: 800px;
        max-width: 100%;
    }

    /* Sección de búsqueda */
    .search-box {
        background-color: #2c3e50;
        padding: 30px;
        border-radius: 15px;
        text-align: center;
        box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
    }
    .search-box h2 {
        margin-top: 0;
        color: #fff;
    }
    #videoId {
        width: 80%;
        padding: 12px;
        border-radius: 5px;
        border: 2px solid #34495e;
        background-color: #1a1a2e;
        color: #fff;
        font-size: 1em;
    }
    #fetchBtn {
        background-color: #2ecc71;
        color: #fff;
        border: none;
        padding: 12px 25px;
        font-size: 1.1em;
        font-weight: bold;
        border-radius: 5px;
        cursor: pointer;
        transition: background-color 0.3s;
        margin-top: 15px;
    }
    #fetchBtn:hover {
        background-color: #27ae60;
    }
    #errorMessage {
        color: #e74c3c;
        margin-top: 15px;
        min-height: 20px;
    }

    /* Contenedor de estadísticas (el diseño de la imagen) */
    .video-container {
        background-color: #2c3e50;
        border-radius: 15px;
        padding: 40px;
        box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
        text-align: center;
    }
    .video-header {
        position: relative;
    }
    .profile-pic {
        width: 60px;
        height: 60px;
        border-radius: 50%;
        border: 2px solid #e74c3c;
        position: absolute;
        top: -70px;
        left: 50%;
        transform: translateX(-50%);
        overflow: hidden;
        background-color: #1a1a2e;
    }
    .profile-pic img {
        width: 100%;
        height: 100%;
        object-fit: cover;
    }
    .video-title {
        font-size: 2em;
        font-weight: bold;
        color: #ffffff;
        margin-top: 30px;
        margin-bottom: 5px;
        word-wrap: break-word;
    }
    .video-creator {
        color: #bdc3c7;
        font-size: 0.9em;
        margin-bottom: 25px;
    }
    .views-count {
        font-size: 6em;
        font-weight: bold;
        color: #ffffff;
        margin: 10px 0;
    }
    .views-label {
        color: #bdc3c7;
        font-size: 0.9em;
        margin-bottom: 40px;
    }
    .stats-container {
        display: flex;
        justify-content: space-around;
        align-items: center;
        flex-wrap: wrap;
        gap: 15px;
        margin-bottom: 40px;
    }
    .stat-item {
        text-align: center;
    }
    .stat-value {
        font-size: 2.5em;
        font-weight: bold;
        color: #ffffff;
    }
    .stat-label {
        color: #bdc3c7;
        font-size: 1em;
    }
    .stat-label i {
        margin-right: 8px;
    }
    .change-video-btn {
        background-color: transparent;
        border: 2px solid #2ecc71;
        color: #2ecc71;
        padding: 12px 30px;
        font-size: 1.1em;
        font-weight: bold;
        border-radius: 50px;
        cursor: pointer;
        transition: background-color 0.3s, color 0.3s;
    }
    .change-video-btn:hover {
        background-color: #2ecc71;
        color: #2c3e50;
    }
    .change-video-btn i {
        margin-left: 8px;
    }
    
    /* Clase para ocultar elementos */
    .hidden {
        display: none;
    }
</style>
</head>
<body>

<div class="main-container">

    <div id="searchSection" class="search-box">
        <h2>Introduce el ID del vídeo de TikTok</h2>
        <input type="text" id="videoId" placeholder="Ej: 7514997965665389846" />
        <br>
        <button id="fetchBtn">Obtener Estadísticas</button>
        <p id="errorMessage"></p>
    </div>

    <div id="resultsSection" class="video-container hidden">
        <div class="video-header">
            <div class="profile-pic">
                <img id="profilePic" src="" alt="Profile Picture">
            </div>
            <h1 id="videoTitle" class="video-title">---</h1>
            <p id="videoCreator" class="video-creator">@---</p>
        </div>

        <div id="viewsCount" class="views-count">---</div>
        <p class="views-label">Views <i class="far fa-eye"></i></p>

        <div class="stats-container">
            <div class="stat-item">
                <div id="likesCount" class="stat-value">--</div>
                <div class="stat-label">
                    <i class="fas fa-heart" style="color: #e74c3c;"></i> Likes
                </div>
            </div>
            <div class="stat-item">
                <div id="commentsCount" class="stat-value">--</div>
                <div class="stat-label">
                    <i class="fas fa-comment-dots"></i> Comments
                </div>
            </div>
            <div class="stat-item">
                <div id="sharesCount" class="stat-value">--</div>
                <div class="stat-label">
                    <i class="fas fa-share-square"></i> Shares
                </div>
            </div>
        </div>

        <button id="changeVideoBtn" class="change-video-btn">
            Buscar Otro Vídeo <i class="fas fa-search"></i>
        </button>
    </div>

</div>

<script>
    // Referencias a los elementos del DOM
    const searchSection = document.getElementById('searchSection');
    const resultsSection = document.getElementById('resultsSection');
    const fetchBtn = document.getElementById('fetchBtn');
    const changeVideoBtn = document.getElementById('changeVideoBtn');
    const videoIdInput = document.getElementById('videoId');
    const errorMessage = document.getElementById('errorMessage');

    // Función para actualizar la UI con los datos de la API
    const updateUI = (data) => {
        // Formatear números grandes con comas (ej. 1000 -> 1,000)
        const formatNumber = (num) => new Intl.NumberFormat('en-US').format(num);

        // Actualizar cada elemento con los datos recibidos
        document.getElementById('profilePic').src = data.music_avatar;
        document.getElementById('videoTitle').innerText = data.desc || "Sin descripción";
        document.getElementById('videoCreator').innerText = `@${data.creator}`;
        document.getElementById('viewsCount').innerText = formatNumber(data.plays);
        document.getElementById('likesCount').innerText = formatNumber(data.likes);
        document.getElementById('commentsCount').innerText = formatNumber(data.comments);
        document.getElementById('sharesCount').innerText = formatNumber(data.shares);
    };

    // Función para hacer la llamada a la API
    const fetchVideoInfo = async () => {
        const videoId = videoIdInput.value.trim();
        if (!videoId) {
            errorMessage.innerText = "Por favor, introduce un ID de vídeo.";
            return;
        }

        // Mostrar estado de carga y limpiar errores
        fetchBtn.disabled = true;
        fetchBtn.innerText = "Cargando...";
        errorMessage.innerText = "";
        
        // --- AVISO IMPORTANTE SOBRE CORS ---
        // La API de countik.com puede tener restricciones (CORS) que impidan
        // llamarla directamente desde un navegador. Para solucionar esto en un
        // entorno real, se usaría un proxy. Aquí añadimos un proxy gratuito
        // para que la llamada funcione en el navegador del cliente.
        const apiUrl = `https://api.allorigins.win/get?url=${encodeURIComponent(`https://countik.com/api/videoinfo/${videoId}`)}`;

        try {
            const response = await fetch(apiUrl);
            if (!response.ok) {
                throw new Error('Error de red al contactar el proxy.');
            }
            
            // El proxy envuelve la respuesta, así que la extraemos de 'contents'
            const apiData = await response.json();
            const data = JSON.parse(apiData.contents);

            if (data.status === "success") {
                // Si la API responde con éxito, actualiza la UI y cambia de vista
                updateUI(data);
                searchSection.classList.add('hidden');
                resultsSection.classList.remove('hidden');
            } else {
                // Si la API indica un error (ej. vídeo no encontrado)
                errorMessage.innerText = data.message || "No se pudo encontrar el vídeo. Verifica el ID.";
            }
        } catch (error) {
            // Si hay un error de red o al procesar los datos
            console.error("Error en la llamada a la API:", error);
            errorMessage.innerText = "Ocurrió un error. Es posible que la API no esté disponible o el ID sea incorrecto.";
        } finally {
            // Reactivar el botón
            fetchBtn.disabled = false;
            fetchBtn.innerText = "Obtener Estadísticas";
        }
    };

    // Función para volver a la pantalla de búsqueda
    const resetView = () => {
        resultsSection.classList.add('hidden');
        searchSection.classList.remove('hidden');
        videoIdInput.value = ""; // Limpiar el campo de texto
        errorMessage.innerText = "";
    };

    // Asignar los eventos a los botones
    fetchBtn.addEventListener('click', fetchVideoInfo);
    changeVideoBtn.addEventListener('click', resetView);
    // Permitir búsqueda al presionar Enter en el campo de texto
    videoIdInput.addEventListener('keyup', (event) => {
        if (event.key === 'Enter') {
            fetchBtn.click();
        }
    });
</script>

</body>
</html>
